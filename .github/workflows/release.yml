name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install librsvg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: bash scripts/bundle.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "Kommit" \
            -srcfolder build/Kommit.app \
            -ov -format UDZO \
            build/Kommit-${{ steps.version.outputs.VERSION }}.dmg

      - name: Create ZIP
        working-directory: build
        run: |
          zip -r Kommit-${{ steps.version.outputs.VERSION }}.zip Kommit.app
          cp Kommit-${{ steps.version.outputs.VERSION }}.zip Kommit.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kommit ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            build/Kommit-${{ steps.version.outputs.VERSION }}.dmg
            build/Kommit-${{ steps.version.outputs.VERSION }}.zip
            build/Kommit.zip
